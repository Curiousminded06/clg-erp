services:
  mongo:
    image: mongo:7
    container_name: clg-erp-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./apps/server
    container_name: clg-erp-server
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - ./apps/server/.env
    environment:
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/clg-erp}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - '${SERVER_PORT:-5000}:5000'

  client:
    build:
      context: ./apps/client
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    container_name: clg-erp-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '${CLIENT_PORT:-5173}:80'

volumes:
  mongo_data:
